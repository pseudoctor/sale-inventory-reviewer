run_mode: "batch" # single: 单系统; batch: 多系统批量
display_name: "陕西华润"
raw_data_dir: "./raw_data"
output_file: "./reports/inventory_risk_report.xlsx"

sales_files:
  - "陕西华润销售202511.xlsx"
  - "陕西华润销售202512.xlsx"
  - "陕西华润销售202601.xlsx"
  - "陕西华润销售202602.xlsx"
  - "陕西华润销售202603.xlsx"

inventory_file: "陕西华润库存.xlsx"

risk_days_high: 60
risk_days_low: 45
sales_window_full_months: 3
sales_window_include_mtd: true
sales_window_recent_days: 30
sales_date_dayfirst: false
sales_date_format: ""
season_mode: false # false: 淡季取低(min), true: 旺季取高(max)
fail_on_empty_window: false
strict_auto_scan: false # true: 自动扫描模式下若候选为空且存在疑似销售文件则直接报错
carton_factor_file: "./data/sku装箱数.xlsx"
province_column_enabled: false

brand_keywords:
  - "伊利"
  - "蒙牛"
  - "南国"
  - "阿宝乐"
  - "畅鲜选"
  - "蜀珑珠"
  - "永璞"
  - "雅士利"
  - "大漠银根"
  - "谷栗村"
  - "君乐宝"
  - "秦俑"
  - "红色拖拉机"
  - "飞鹤"
  - "雀巢"
  - "Seesaw"
  - "佳贝艾特"

batch:
  continue_on_error: true
  summary_output_file: "./reports/batch_run_summary.xlsx"
  systems:
    - enabled: true
      system_id: "gansu_wumei"
      display_name: "宁夏物美"
      province_column_enabled: true
      data_subdir: "宁夏物美"
      sales_files:
        - "物美销售202602.xls"
        - "物美销售202603.xls"
      inventory_file: "物美库存.xls"
      carton_factor_file: "./data/sku装箱数.xlsx"
    - enabled: true
      system_id: "shaanxi_huarun"
      display_name: "陕西华润"
      data_subdir: "陕西华润"
      sales_files:
        - "陕西华润销售202511.xlsx"
        - "陕西华润销售202512.xlsx"
        - "陕西华润销售202601.xlsx"
        - "陕西华润销售202602.xlsx"
      inventory_file: "陕西华润库存.xlsx"
    - enabled: true
      system_id: "gansu_huarun"
      display_name: "甘肃华润"
      data_subdir: "甘肃华润"
      sales_files:
        - "甘肃华润销售202601.xlsx"
        - "甘肃华润销售202602.xlsx"
        - "甘肃华润销售202603.xlsx"
      inventory_file: "甘肃华润库存.xlsx"
